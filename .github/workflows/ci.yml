name: CI

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: insuretech
          POSTGRES_PASSWORD: insuretech
          POSTGRES_DB: insuretech
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Lint
        run: cd backend && ruff check .
      - name: Type check
        run: cd backend && mypy .
      - name: Test
        run: cd backend && pytest
        env:
          DATABASE_URL: postgresql+asyncpg://insuretech:insuretech@localhost:5432/insuretech

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Lint
        run: cd frontend && npx eslint src/
      - name: Build
        run: cd frontend && npm run build
